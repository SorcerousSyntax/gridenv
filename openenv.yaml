---
name: gridworld-survival
version: "1.0.0"
description: >
  GridWorld Survival is a procedurally generated 2D grid mini-game where an
  AI agent must navigate hazards, collect resources, and reach the exit.
  Three tasks of increasing difficulty test navigation, planning, and survival.
author: Harsh8338
tags:
  - mini-game
  - gridworld
  - rl
  - navigation
  - openenv

entry_point: app.py
reset_endpoint: "/reset"
step_endpoint: "/step"
state_endpoint: "/state"

tasks:
  - id: reach_goal
    name: Reach the Goal
    difficulty: easy
    max_steps: 30
    description: Navigate a 5x5 grid from start to the exit. No hazards.

  - id: collect_and_escape
    name: Collect and Escape
    difficulty: medium
    max_steps: 50
    description: Navigate a 7x7 grid. Collect at least 3 coins before reaching the exit.

  - id: survive_and_escape
    name: Survive and Escape
    difficulty: hard
    max_steps: 80
    description: Navigate a 9x9 grid with walls, traps, and moving enemies.

observation_space:
  type: object
  properties:
    grid:
      type: array
    agent_pos:
      type: array
    goal_pos:
      type: array
    coins_collected:
      type: integer
    health:
      type: integer
    current_step:
      type: integer
    max_steps:
      type: integer
    done:
      type: boolean
    task_id:
      type: string

action_space:
  type: string
  enum: [UP, DOWN, LEFT, RIGHT, STAY]

reward_range: [0.0, 1.0]